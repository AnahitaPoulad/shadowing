services:
  - type: web
    name: shadowing-backend
    runtime: docker
    dockerfilePath: ./web-app/backend/Dockerfile
    dockerContext: ./web-app/backend
    plan: free
    healthCheckPath: /api/lessons
    envVars:
      - key: STORAGE_DIR
        value: /tmp/storage
      - key: DB_PATH
        value: /tmp/shadowing.db
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
